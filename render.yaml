services:
  - type: web
    name: gentlecare-api
    env: python
    rootDir: Server
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k gthread -w 1 --threads 8 app_new:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: python
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /tmp/gcp-credentials.json

  - type: web
    name: gentlecare-web
    runtime: static
    rootDir: Client
    buildCommand: npm ci && npx expo export --platform web
    staticPublishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_BASE_URL
        sync: false