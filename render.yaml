services:
  - type: web
    name: gentlecare-api
    env: python
    rootDir: Server
    buildCommand: pip install -r requirements.txt
    startCommand: python app_new.py
    envVars:
      - key: PORT
        value: 10000
      - key: FLASK_DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /opt/render/project/src/Server/gcp-credentials.json
